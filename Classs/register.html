<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Legacy Dance Studio</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
   <style>
@media(max-width:768px){
.hamburger {
    display: flex;
    flex-direction: column;
    cursor: pointer;
}

.hamburger span {
    width: 25px;
    height: 2px;
    background: white;
    margin: 3px 0;
}

/* NAV MENU */
.nav-links {
    position: fixed;
    top: 0;
    right: -100%;   /* hidden */
    width: 75%;
    height: 100vh;

    display: flex;
    flex-direction: column;
    gap: 20px;
    padding: 80px 25px;

    background: rgba(20, 120, 120, 0.95);
    backdrop-filter: blur(15px);

    transition: right 0.4s ease;
    z-index: 999;
}

/* SHOW MENU */
.nav-links.active {
    right: 0;
}

/* LINKS */
.nav-links a {
    color: white;
    font-size: 18px;
    padding: 12px;
    border-radius: 10px;
}

/* OVERLAY */
.overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;

    background: rgba(0,0,0,0.4);

    opacity: 0;
    visibility: hidden;

    transition: 0.3s;
    z-index: 998;
}

.overlay.active {
    opacity: 1;
    visibility: visible;
}

        }
    </style>
</head>
<body>
    <header>
        <nav>
            <a href="index.html" class="logo">Legacy Dance Studio</a>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="classes.html">Classes</a></li>
                <li class="dropdown">
                    <a href="schedule.html" class="dropdown-toggle">Schedule</a>
                        <ul class="dropdown-menu">
                            <li><a href="batch1.html">Hip-Hop Batch</a></li>
                            <li><a href="batch2.html">Kids Batch</a></li>
                        </ul>
                </li>                
                <li><a href="register.html" class="active">Appointment</a></li>
                <li><a href="contact.html">Contact</a></li>
                <li><a href="aboutus.html">About Us</a></li>
            </ul>
            <div class="hamburger" onclick="toggleMenu(event)">
                <span></span>
                <span></span>
                <span></span>
            </div>
            <div class="overlay" onclick="toggleMenu(event)"></div>
        </nav>
    </header>

    <section class="form-hero">
        <div class="hero-content">
            <h1>Register Today</h1>
            <p>Secure your spot in our upcoming classes</p>
        </div>
    </section>

    <section class="register-section">
        <div class="container">
            <div class="form-container">
                <form id="registrationForm">
                    <div class="form-group">
                        <label><i class="fas fa-user"></i> Full Name</label>
                        <input id="name" type="text" required>
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-envelope"></i> Email</label>
                        <input id="email" type="email" required>
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-phone"></i> Phone</label>
                        <input id="phone" type="tel">
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-calendar"></i> Preferred Start Date</label>
                        <input id="date" type="date">
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-dancing"></i> Class Interest</label>
                        <select id="class" required>
                            <option value="">Choose your class</option>
                            <option value="hiphop">Hip Hop</option>
                            <option value="kids">Kids Basics</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-info-circle"></i> Experience Level</label>
                        <select id="level" required>
                            <option value="">Select level</option>
                            <option value="beginner">Beginner</option>
                            <option value="intermediate">Intermediate</option>
                            <option value="advanced">Advanced</option>
                        </select>
                    </div>
                    <button type="submit" class="submit-btn">
                        <i class="fas fa-check"></i> Register Now
                    </button>
                </form>
            </div>
        </div>
    </section>

    <footer>
        <div class="container">
            <p>&copy; 2024 Legacy Dance Studio</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<script>
(function(){
    emailjs.init("dkQo059uObJr7fJim"); // 🔑 paste here
})();

function sendEmail(e) {

    let name = document.getElementById("name").value;
    let email = document.getElementById("email").value;
    let phone = document.getElementById("phone").value;
    let date = document.getElementById("date").value;
    let classType = document.getElementById("class").value;
    let level = document.getElementById("level").value;

    emailjs.send("service_agzh7dp", "template_b7q833j", {
        name: name,
        email: email,
        phone: phone,
        date: date,
        class: classType,
        level: level
    })
    .then(() => {
        alert(" Registration successful!");
        document.querySelector("form").reset();
    })
    .catch((error) => {
        console.error(error);
        alert("❌ Failed to send. Try again.");
    });
}
</script>
<script src="script2.js"></script>
</body>
</html>
